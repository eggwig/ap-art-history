<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>艺术史时间轴</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* 你好小猫 */
:root, [data-theme="neko"] {
  --bg: #fde8f0;
  --bg2: #fcd6e6;
  --pink: #f4a7c0;
  --pink-dark: #e8749c;
  --ink: #3a2230;
  --ink-light: #7a5a6a;
  --white: #fff;
  --card-bg: #fff;
  --line: #e8749c;
  --dot: #e8749c;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(232,116,156,0.18);
}

/* 五彩斑斓的黑 */
[data-theme="kuro"] {
  --bg: #151c29;
  --bg2: #1e2738;
  --pink: #3b4659;
  --pink-dark: #5b7090;
  --ink: #e8edf5;
  --ink-light: #8a97aa;
  --white: #1e2738;
  --card-bg: #1e2738;
  --line: #ffffff;
  --dot: #5b7090;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(21,28,41,0.5);
}
[data-theme="kuro"] body {
  background-image:
    radial-gradient(circle at 20% 10%, rgba(59,70,89,0.3) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(87,100,112,0.2) 0%, transparent 50%);
}
[data-theme="kuro"] #header {
  background: rgba(21,28,41,0.92);
}
[data-theme="kuro"] #period-modal-inner,
[data-theme="kuro"] .pm-work-item {
  background: var(--card-bg);
  color: var(--ink);
}
[data-theme="kuro"] #work-detail {
  background: var(--bg);
}
[data-theme="kuro"] #wd-header {
  background: rgba(21,28,41,0.95);
}
[data-theme="kuro"] .period-card-inner {
  background: var(--card-bg);
  border-color: rgba(91,112,144,0.2);
}
[data-theme="kuro"] .wdm-input {
  background: var(--bg2);
  border-color: rgba(91,112,144,0.3);
  color: var(--ink);
}
[data-theme="kuro"] #pwd-box {
  background: var(--card-bg);
}
[data-theme="kuro"] #pwd-input {
  background: var(--bg2);
  color: var(--ink);
}
[data-theme="kuro"] #search-overlay {
  background: rgba(21,28,41,0.97);
}
[data-theme="kuro"] #search-input {
  background: var(--bg2);
  color: var(--ink);
  border-color: var(--pink-dark);
}
[data-theme="kuro"] .search-result-item {
  background: var(--bg2);
  border-color: rgba(91,112,144,0.2);
  color: var(--ink);
}
[data-theme="kuro"] .wd-chip {
  background: var(--bg2);
  color: var(--ink);
}
[data-theme="kuro"] #wd-location {
  background: rgba(91,112,144,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(255,192,220,0.4) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(255,210,230,0.35) 0%, transparent 50%);
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Header ── */
#header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(253,232,240,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 14px 20px 12px;
  border-bottom: 1px solid rgba(232,116,156,0.15);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#header h1 {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 18px;
  color: var(--pink-dark);
  letter-spacing: 1px;
}
#search-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--pink-dark);
  color: #fff;
  border: none;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ── Search overlay ── */
#search-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(253,232,240,0.97);
  padding: 20px;
  flex-direction: column;
  gap: 12px;
}
#search-overlay.open { display: flex; }
#search-row { display: flex; gap: 10px; align-items: center; }
#search-input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 20px;
  border: 2px solid var(--pink-dark);
  background: #fff;
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  outline: none;
}
#search-cancel {
  background: none; border: none;
  color: var(--pink-dark); font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; padding: 4px;
}
#search-results {
  overflow-y: auto;
  flex: 1;
}
.search-result-item {
  padding: 12px 16px;
  border-radius: 12px;
  background: #fff;
  margin-bottom: 8px;
  cursor: pointer;
  border: 1px solid rgba(232,116,156,0.15);
  transition: background 0.15s;
}
.search-result-item:active { background: var(--bg2); }
.search-result-item .sr-name { font-weight: 600; font-size: 15px; }
.search-result-item .sr-meta { font-size: 12px; color: var(--ink-light); margin-top: 2px; }

/* ── Timeline container ── */
#timeline {
  padding: 24px 0 60px;
  position: relative;
}

/* Central vertical line */
#timeline::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, transparent, var(--pink) 5%, var(--pink) 95%, transparent);
  transform: translateX(-50%);
}

/* ── Period section ── */
.period-section {
  position: relative;
  margin-bottom: 8px;
}

/* Period header node on the line */
.period-node {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  margin: 0 0 4px;
}
.period-node-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 3px solid #fff;
  box-shadow: 0 0 0 2px var(--dot);
  background: var(--dot);
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}

/* Period card — alternating left/right */
.period-card {
  position: relative;
  width: calc(50% - 28px);
  margin-bottom: 4px;
  cursor: pointer;
  transition: transform 0.2s;
}
.period-card:active { transform: scale(0.97); }

.period-section:nth-child(odd) .period-card  { margin-left: 12px; }
.period-section:nth-child(even) .period-card { margin-left: calc(50% + 16px); }

/* Connector line from card to spine */
.period-card::before {
  content: '';
  position: absolute;
  top: 24px;
  height: 2px;
  background: var(--pink);
  opacity: 0.5;
  z-index: 1;
}
.period-section:nth-child(odd) .period-card::before {
  right: -16px;
  width: 16px;
}
.period-section:nth-child(even) .period-card::before {
  left: -16px;
  width: 16px;
}

.period-card-inner {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 12px 14px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(232,116,156,0.12);
  position: relative;
  z-index: 2;
}
.period-color-bar {
  width: 32px; height: 4px;
  border-radius: 2px;
  margin-bottom: 6px;
}
.period-label {
  font-size: 10px;
  color: var(--ink-light);
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.period-title-zh {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 15px;
  color: var(--ink);
  line-height: 1.2;
}
.period-title-en {
  font-size: 10px;
  color: var(--ink-light);
  margin-top: 1px;
}
.period-count {
  font-size: 10px;
  color: var(--pink-dark);
  margin-top: 4px;
  font-weight: 600;
}

/* Work dots row */
.work-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 6px 0 2px 0;
}
.work-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  cursor: pointer;
  opacity: 0.7;
  transition: transform 0.15s, opacity 0.15s;
  flex-shrink: 0;
}
.work-dot:active { transform: scale(1.4); opacity: 1; }

/* ── Work detail fullscreen ── */
#work-detail {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 300;
  background: var(--bg);
  flex-direction: column;
  overflow: hidden;
}
#work-detail.open { display: flex; }

#wd-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(253,232,240,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(232,116,156,0.15);
  flex-shrink: 0;
}
#wd-back {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg2);
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--pink-dark);
  flex-shrink: 0;
}
#wd-header-title {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 16px;
  color: var(--ink);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#wd-tag {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 10px;
  color: #fff;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}

#wd-body {
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

#wd-img-wrap {
  width: 100%;
  height: 240px;
  background: linear-gradient(135deg, var(--bg2), var(--pink));
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
#wd-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: none;
}
#wd-img-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  gap: 8px;
}
#wd-img-placeholder span { font-size: 32px; }
#wd-img-credit {
  position: absolute;
  bottom: 8px; right: 10px;
  font-size: 10px;
  color: rgba(255,255,255,0.75);
  background: rgba(0,0,0,0.25);
  padding: 2px 6px;
  border-radius: 6px;
}

#wd-content {
  padding: 20px 16px 40px;
}
#wd-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--ink);
  line-height: 1.25;
  margin-bottom: 6px;
}
#wd-artist {
  font-size: 14px;
  color: var(--ink-light);
  margin-bottom: 14px;
}
.wd-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.wd-chip {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  background: var(--bg2);
  color: var(--ink);
}
#wd-location {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  background: rgba(232,116,156,0.08);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--ink);
  margin-bottom: 16px;
  line-height: 1.4;
}
#wd-location .pin { font-size: 14px; flex-shrink: 0; }
#wd-notes {
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink);
  margin-bottom: 20px;
}
#wd-notes strong { color: var(--pink-dark); }
#wd-smarthistory {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 20px;
  background: var(--pink-dark);
  color: #fff;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  letter-spacing: 0.3px;
  width: 100%;
  justify-content: center;
}

/* ── Period list modal ── */
#period-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 250;
  background: rgba(58,34,48,0.4);
  align-items: flex-end;
}
#period-modal.open { display: flex; }
#period-modal-inner {
  background: #fff;
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-height: 75vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
#period-modal-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(232,116,156,0.15);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#period-modal-title {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 18px;
  color: var(--ink);
}
#period-modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg2);
  border: none;
  font-size: 16px;
  cursor: pointer;
  color: var(--ink-light);
}
#period-modal-list {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 8px 16px 20px;
}
.pm-work-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(232,116,156,0.1);
  cursor: pointer;
  transition: opacity 0.15s;
}
.pm-work-item:active { opacity: 0.6; }
.pm-work-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.pm-work-name { font-size: 15px; font-weight: 500; }
.pm-work-artist { font-size: 12px; color: var(--ink-light); margin-top: 1px; }
.pm-work-date { font-size: 11px; color: var(--pink-dark); margin-top: 2px; }

/* Handle bar */
#period-modal-inner::before {
  content: '';
  display: block;
  width: 36px; height: 4px;
  border-radius: 2px;
  background: rgba(58,34,48,0.15);
  margin: 10px auto 0;
  flex-shrink: 0;
}

/* Scroll to top fab */
#fab-top {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--pink-dark);
  color: #fff;
  border: none;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(232,116,156,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
  transition: opacity 0.2s;
}
#fab-top.visible { display: flex; }

  /* ── Edit button & form ── */
  #wd-edit-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--bg2); border: none;
    font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.6; transition: opacity 0.15s;
    flex-shrink: 0;
  }
  #wd-edit-btn:active { opacity: 1; }
  #wd-edit-btn.editing { opacity: 1; background: var(--pink); }

  #wd-edit-mode { padding: 0 16px 40px; }
  .wdm-label {
    font-size: 10px; font-weight: 700;
    color: var(--pink-dark); text-transform: uppercase;
    letter-spacing: 0.08em; margin: 14px 0 5px;
  }
  .wdm-input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid rgba(232,116,156,0.3);
    border-radius: 12px;
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    color: var(--ink); background: #fff;
    outline: none; box-sizing: border-box;
    transition: border-color 0.15s;
  }
  .wdm-input:focus { border-color: var(--pink-dark); }
  textarea.wdm-input { resize: vertical; min-height: 100px; line-height: 1.6; }
  .wdm-buttons { display: flex; gap: 10px; margin-top: 20px; }
  .wdm-btn {
    flex: 1; padding: 12px 0;
    border: none; border-radius: 12px;
    font-size: 14px; font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }
  .wdm-btn-save { background: var(--pink-dark); color: #fff; }
  .wdm-btn-cancel { background: var(--bg2); color: var(--ink); }

  /* Password modal */
  #pwd-modal {
    display: none; position: fixed; inset: 0;
    z-index: 400; background: rgba(58,34,48,0.45);
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  #pwd-modal.open { display: flex; }
  #pwd-box {
    background: #fff; border-radius: 20px;
    padding: 28px 24px 22px;
    width: min(300px, 88vw);
    text-align: center;
  }
  #pwd-box .pwd-icon { font-size: 28px; margin-bottom: 8px; }
  #pwd-box .pwd-title { font-family: 'ZCOOL KuaiLe', cursive; font-size: 18px; color: var(--pink-dark); margin-bottom: 16px; }
  #pwd-input {
    width: 100%; padding: 10px 14px;
    border: 2px solid rgba(232,116,156,0.3);
    border-radius: 12px; font-size: 15px;
    text-align: center; letter-spacing: 2px;
    outline: none; box-sizing: border-box;
    margin-bottom: 12px; transition: border-color 0.15s;
  }
  #pwd-input:focus { border-color: var(--pink-dark); }
  .pwd-buttons { display: flex; gap: 8px; }
  .pwd-btn {
    flex: 1; padding: 11px 0; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 700;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
  }
  .pwd-btn-ok { background: var(--pink-dark); color: #fff; }
  .pwd-btn-cancel { background: var(--bg2); color: var(--ink); }
  #pwd-error { margin-top: 8px; font-size: 12px; color: #e74c3c; min-height: 16px; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1>艺术史 · Art History</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <button id="theme-btn" style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.3);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">🌸</button>
    <button id="search-btn">🔍</button>
  </div>
</div>

<!-- Search overlay -->
<div id="search-overlay">
  <div id="search-row">
    <input id="search-input" type="search" placeholder="搜索作品、艺术家…" autocomplete="off">
    <button id="search-cancel">取消</button>
  </div>
  <div id="search-results"></div>
</div>

<!-- Timeline -->
<div id="timeline"></div>

<!-- Period works modal (bottom sheet) -->
<div id="period-modal">
  <div id="period-modal-inner">
    <div id="period-modal-header">
      <span id="period-modal-title"></span>
      <button id="period-modal-close">×</button>
    </div>
    <div id="period-modal-list"></div>
  </div>
</div>

<!-- Work detail fullscreen -->
<div id="work-detail">
  <div id="wd-header">
    <button id="wd-back">←</button>
    <div id="wd-header-title"></div>
    <button id="wd-edit-btn" title="编辑">✏️</button>
    <span id="wd-tag"></span>
  </div>
  <div id="wd-body">
    <div id="wd-img-wrap">
      <img id="wd-img" alt="">
      <div id="wd-img-placeholder"><span>🖼️</span>loading…</div>
      <div id="wd-img-credit"></div>
    </div>
    <div id="wd-content">
      <div id="wd-title"></div>
      <div id="wd-artist"></div>
      <div class="wd-chips" id="wd-chips"></div>
      <div id="wd-location" style="display:none"><span class="pin">📍</span><span id="wd-location-text"></span></div>
      <div id="wd-notes"></div>
      <a id="wd-smarthistory" href="#" target="_blank" rel="noopener" style="display:none">📖 Read on Smarthistory</a>
    </div>
    <!-- Edit mode -->
    <div id="wd-edit-mode" style="display:none; padding:0 16px 40px;">
      <div class="wdm-label">标题 Title</div>
      <input class="wdm-input" id="wdm-name" type="text" placeholder="作品名称">
      <div class="wdm-label">艺术家 Artist</div>
      <input class="wdm-input" id="wdm-artist" type="text" placeholder="艺术家">
      <div class="wdm-label">日期 Date</div>
      <input class="wdm-input" id="wdm-date" type="text" placeholder="如 c. 1503–1519">
      <div class="wdm-label">材质 Medium</div>
      <input class="wdm-input" id="wdm-medium" type="text" placeholder="如 Oil on panel">
      <div class="wdm-label">地点 Location</div>
      <input class="wdm-input" id="wdm-location-edit" type="text" placeholder="如 Louvre, Paris">
      <div class="wdm-label">笔记 Notes <span style="font-weight:400;opacity:0.6">（**粗体**）</span></div>
      <textarea class="wdm-input" id="wdm-notes" rows="5"></textarea>
      <div class="wdm-label">Smarthistory 链接</div>
      <input class="wdm-input" id="wdm-sh" type="url" placeholder="https://smarthistory.org/...">
      <div class="wdm-buttons">
        <button class="wdm-btn wdm-btn-save" id="wdm-save">💾 保存</button>
        <button class="wdm-btn wdm-btn-cancel" id="wdm-cancel">取消</button>
      </div>
    </div>
  </div>
</div>

<!-- Scroll to top -->

// ── Load saved edits ──────────────────────────────────────────────────────────
try {
  const saved = localStorage.getItem('art-timeline-mobile-v1');
  if (saved) {
    const savedData = JSON.parse(saved);
    savedData.forEach(sp => {
      const period = DATA.find(d => d.id === sp.id);
      if (!period) return;
      (sp.works || []).forEach(sw => {
        const work = period.works?.find(w => w.id === sw.id);
        if (work) Object.assign(work, sw);
      });
    });
  }
} catch(e) {}

// ── Render timeline ──────────────────────────────────────────────────────────
const timeline = document.getElementById('timeline');

DATA.sort((a, b) => a.year - b.year);

DATA.forEach((period, idx) => {
  const section = document.createElement('div');
  section.className = 'period-section';
  section.dataset.periodId = period.id;

  // Node dot on spine
  const node = document.createElement('div');
  node.className = 'period-node';
  const dot = document.createElement('div');
  dot.className = 'period-node-dot';
  dot.style.background = period.color;
  dot.style.boxShadow = `0 0 0 2px ${period.color}`;
  node.appendChild(dot);

  // Period card
  const card = document.createElement('div');
  card.className = 'period-card';
  card.dataset.periodId = period.id;

  const inner = document.createElement('div');
  inner.className = 'period-card-inner';

  const colorBar = document.createElement('div');
  colorBar.className = 'period-color-bar';
  colorBar.style.background = period.color;

  const label = document.createElement('div');
  label.className = 'period-label';
  label.textContent = period.label || period.period;

  const titleZh = document.createElement('div');
  titleZh.className = 'period-title-zh';
  titleZh.textContent = period.title;

  const titleEn = document.createElement('div');
  titleEn.className = 'period-title-en';
  titleEn.textContent = period.titleEn;

  const count = document.createElement('div');
  count.className = 'period-count';
  count.textContent = (period.works?.length || 0) + ' WORKS →';

  // Work dots
  const dotsRow = document.createElement('div');
  dotsRow.className = 'work-dots';
  (period.works || []).forEach(work => {
    const d = document.createElement('div');
    d.className = 'work-dot';
    d.style.background = period.color;
    d.dataset.workId = work.id;
    d.dataset.periodId = period.id;
    d.title = work.name;
    dotsRow.appendChild(d);
  });

  inner.appendChild(colorBar);
  inner.appendChild(label);
  inner.appendChild(titleZh);
  inner.appendChild(titleEn);
  inner.appendChild(count);
  inner.appendChild(dotsRow);
  card.appendChild(inner);

  section.appendChild(node);
  section.appendChild(card);
  timeline.appendChild(section);
});

// ── Period card click → bottom sheet ────────────────────────────────────────
const periodModal      = document.getElementById('period-modal');
const periodModalTitle = document.getElementById('period-modal-title');
const periodModalList  = document.getElementById('period-modal-list');
const periodModalClose = document.getElementById('period-modal-close');

function openPeriodModal(periodId) {
  const period = DATA.find(d => d.id === periodId);
  if (!period) return;
  periodModalTitle.textContent = period.title + ' · ' + period.titleEn;
  periodModalList.innerHTML = '';
  (period.works || []).forEach(work => {
    const item = document.createElement('div');
    item.className = 'pm-work-item';
    item.dataset.workId = work.id;
    item.dataset.periodId = period.id;
    const dot = document.createElement('div');
    dot.className = 'pm-work-dot';
    dot.style.background = period.color;
    const info = document.createElement('div');
    info.style.flex = '1';
    info.innerHTML = `<div class="pm-work-name">${work.name}</div>
      <div class="pm-work-artist">${work.artist}</div>
      <div class="pm-work-date">${work.date}</div>`;
    item.appendChild(dot);
    item.appendChild(info);
    item.appendChild(document.createTextNode('›'));
    periodModalList.appendChild(item);
  });
  periodModal.classList.add('open');
}

periodModalClose.addEventListener('click', () => periodModal.classList.remove('open'));
periodModal.addEventListener('click', e => { if (e.target === periodModal) periodModal.classList.remove('open'); });

// Period card click
timeline.addEventListener('click', e => {
  const dot = e.target.closest('.work-dot');
  if (dot) { e.stopPropagation(); openWorkDetail(dot.dataset.workId, dot.dataset.periodId); return; }
  const card = e.target.closest('.period-card');
  if (card) { openPeriodModal(card.dataset.periodId); return; }
});

// Work item in modal
periodModalList.addEventListener('click', e => {
  const item = e.target.closest('.pm-work-item');
  if (!item) return;
  periodModal.classList.remove('open');
  setTimeout(() => openWorkDetail(item.dataset.workId, item.dataset.periodId), 200);
});

// ── Work detail ──────────────────────────────────────────────────────────────
const workDetail = document.getElementById('work-detail');
const wdBack     = document.getElementById('wd-back');
const wdImg      = document.getElementById('wd-img');
const wdPlaceholder = document.getElementById('wd-img-placeholder');
const wdCredit   = document.getElementById('wd-img-credit');

function openWorkDetail(workId, periodId) {
  const period = DATA.find(d => d.id === periodId);
  const work   = period?.works?.find(w => w.id === workId);
  if (!work) return;

  document.getElementById('wd-header-title').textContent = work.name;
  const tag = document.getElementById('wd-tag');
  tag.textContent = period.titleEn;
  tag.style.background = period.color;

  document.getElementById('wd-title').textContent = work.name;
  document.getElementById('wd-artist').textContent = work.artist;

  // Chips
  const chips = document.getElementById('wd-chips');
  chips.innerHTML = '';
  [work.date, work.medium].filter(Boolean).forEach(t => {
    const c = document.createElement('span');
    c.className = 'wd-chip';
    c.textContent = t;
    chips.appendChild(c);
  });

  // Location
  const locWrap = document.getElementById('wd-location');
  const locText = document.getElementById('wd-location-text');
  if (work.location) { locText.textContent = work.location; locWrap.style.display = 'flex'; }
  else { locWrap.style.display = 'none'; }

  // Notes with bold markdown
  const notesEl = document.getElementById('wd-notes');
  notesEl.innerHTML = (work.notes || '').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Smarthistory link
  const shLink = document.getElementById('wd-smarthistory');
  if (work.smarthistoryUrl) {
    shLink.href = work.smarthistoryUrl;
    shLink.style.display = 'inline-flex';
  } else {
    shLink.style.display = 'none';
  }

  // Reset image
  wdImg.style.display = 'none';
  wdImg.src = '';
  wdPlaceholder.style.display = 'flex';
  wdPlaceholder.innerHTML = '<span>🖼️</span>loading…';
  wdCredit.textContent = '';

  workDetail.classList.add('open');
  _editWorkId = work.id; _editPeriodId = period.id;
  closeEditMode();
  document.getElementById('wd-body').scrollTop = 0;
  loadWikiImage(work.name, work.artist);
}

wdBack.addEventListener('click', () => workDetail.classList.remove('open'));

// ── Wikipedia image (fetch API) ──────────────────────────────────────────────
function loadWikiImage(workName, artistName) {
  const query = workName + (artistName && artistName !== 'Unknown' ? ' ' + artistName : '');
  fetch('https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch='
    + encodeURIComponent(query) + '&format=json&srlimit=3&origin=*')
  .then(r => r.json())
  .then(data => {
    const hits = data.query?.search;
    if (!hits?.length) { wdPlaceholder.innerHTML = '<span>🖼️</span>No image found'; return; }
    const pageTitle = hits[0].title;
    return fetch('https://en.wikipedia.org/w/api.php?action=query&titles='
      + encodeURIComponent(pageTitle)
      + '&prop=pageimages&pithumbsize=800&format=json&origin=*')
    .then(r => r.json())
    .then(d2 => {
      const page  = Object.values(d2.query?.pages || {})[0];
      const thumb = page?.thumbnail?.source;
      if (thumb) {
        wdImg.onload = () => { wdPlaceholder.style.display = 'none'; wdImg.style.display = 'block'; wdCredit.textContent = 'via Wikipedia · ' + pageTitle; };
        wdImg.onerror = () => { wdPlaceholder.innerHTML = '<span>🖼️</span>Image unavailable'; };
        wdImg.src = thumb;
      } else {
        wdPlaceholder.innerHTML = '<span>🖼️</span>No image found';
      }
    });
  })
  .catch(() => { wdPlaceholder.innerHTML = '<span>🖼️</span>Unavailable'; });
}

// ── Search ───────────────────────────────────────────────────────────────────
const searchOverlay = document.getElementById('search-overlay');
const searchInput   = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

document.getElementById('search-btn').addEventListener('click', () => {
  searchOverlay.classList.add('open');
  setTimeout(() => searchInput.focus(), 100);
});
document.getElementById('search-cancel').addEventListener('click', () => {
  searchOverlay.classList.remove('open');
  searchInput.value = '';
  searchResults.innerHTML = '';
});

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  searchResults.innerHTML = '';
  if (!q) return;
  const hits = [];
  DATA.forEach(period => {
    (period.works || []).forEach(work => {
      if (work.name.toLowerCase().includes(q) || work.artist.toLowerCase().includes(q)) {
        hits.push({ work, period });
      }
    });
  });
  hits.slice(0, 20).forEach(({ work, period }) => {
    const item = document.createElement('div');
    item.className = 'search-result-item';
    item.innerHTML = `<div class="sr-name">${work.name}</div>
      <div class="sr-meta">${work.artist} · ${work.date} · ${period.titleEn}</div>`;
    item.addEventListener('click', () => {
      searchOverlay.classList.remove('open');
      searchInput.value = '';
      searchResults.innerHTML = '';
      setTimeout(() => openWorkDetail(work.id, period.id), 150);
    });
    searchResults.appendChild(item);
  });
  if (!hits.length) {
    searchResults.innerHTML = '<div style="padding:20px;text-align:center;color:var(--ink-light)">No results</div>';
  }
});

// ── Scroll to top ────────────────────────────────────────────────────────────
const fabTop = document.getElementById('fab-top');
window.addEventListener('scroll', () => {
  fabTop.classList.toggle('visible', window.scrollY > 300);
}, { passive: true });
fabTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

</script>

<!-- Password modal -->
<div id="pwd-modal">
  <div id="pwd-box">
    <div class="pwd-icon">🔐</div>
    <div class="pwd-title">编辑模式</div>
    <input id="pwd-input" type="password" placeholder="请输入密码" autocomplete="current-password">
    <div class="pwd-buttons">
      <button class="pwd-btn pwd-btn-ok" id="pwd-ok">确认</button>
      <button class="pwd-btn pwd-btn-cancel" id="pwd-cancel-btn">取消</button>
    </div>
    <div id="pwd-error"></div>
  </div>
</div>
<script>
// ── Password guard ────────────────────────────────────────────────────────────
const EDIT_PWD_HASH = 'a678386ce60a2386adbf3d848123d6fbdaa2eafbac343eacfbc91d6ed5792519';
const EDIT_SESSION_KEY = 'art-edit-unlocked';
let _pendingEditCb = null;

async function hashPwd(pwd) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function requirePassword(cb) {
  if (sessionStorage.getItem(EDIT_SESSION_KEY) === '1') { cb(); return; }
  _pendingEditCb = cb;
  document.getElementById('pwd-modal').classList.add('open');
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-error').textContent = '';
  setTimeout(() => document.getElementById('pwd-input').focus(), 100);
}

document.getElementById('pwd-ok').addEventListener('click', async () => {
  const hash = await hashPwd(document.getElementById('pwd-input').value);
  if (hash === EDIT_PWD_HASH) {
    sessionStorage.setItem(EDIT_SESSION_KEY, '1');
    document.getElementById('pwd-modal').classList.remove('open');
    if (_pendingEditCb) { _pendingEditCb(); _pendingEditCb = null; }
  } else {
    document.getElementById('pwd-error').textContent = '密码错误，请重试';
    document.getElementById('pwd-input').value = '';
    setTimeout(() => document.getElementById('pwd-error').textContent = '', 1500);
  }
});
document.getElementById('pwd-cancel-btn').addEventListener('click', () => {
  document.getElementById('pwd-modal').classList.remove('open');
  _pendingEditCb = null;
});
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pwd-ok').click();
});

// ── Work detail edit mode ─────────────────────────────────────────────────────
let _editWorkId = null, _editPeriodId = null;
const wdEditBtn  = document.getElementById('wd-edit-btn');
const wdViewContent = document.getElementById('wd-content');
const wdEditMode = document.getElementById('wd-edit-mode');

function openEditMode() {
  const period = DATA.find(d => d.id === _editPeriodId);
  const work   = period?.works?.find(w => w.id === _editWorkId);
  if (!work) return;
  document.getElementById('wdm-name').value     = work.name    || '';
  document.getElementById('wdm-artist').value   = work.artist  || '';
  document.getElementById('wdm-date').value     = work.date    || '';
  document.getElementById('wdm-medium').value   = work.medium  || '';
  document.getElementById('wdm-location-edit').value = work.location || '';
  document.getElementById('wdm-notes').value    = work.notes   || '';
  document.getElementById('wdm-sh').value       = work.smarthistoryUrl || '';
  wdViewContent.style.display = 'none';
  wdEditMode.style.display = 'block';
  wdEditBtn.textContent = '👁';
  wdEditBtn.classList.add('editing');
}

function closeEditMode() {
  wdViewContent.style.display = 'block';
  wdEditMode.style.display = 'none';
  wdEditBtn.textContent = '✏️';
  wdEditBtn.classList.remove('editing');
}

wdEditBtn.addEventListener('click', () => {
  if (wdEditMode.style.display === 'block') { closeEditMode(); }
  else { requirePassword(openEditMode); }
});

document.getElementById('wdm-cancel').addEventListener('click', closeEditMode);

document.getElementById('wdm-save').addEventListener('click', () => {
  const period = DATA.find(d => d.id === _editPeriodId);
  const work   = period?.works?.find(w => w.id === _editWorkId);
  if (!work) return;
  work.name     = document.getElementById('wdm-name').value.trim()   || work.name;
  work.artist   = document.getElementById('wdm-artist').value.trim();
  work.date     = document.getElementById('wdm-date').value.trim();
  work.medium   = document.getElementById('wdm-medium').value.trim();
  work.location = document.getElementById('wdm-location-edit').value.trim();
  work.notes    = document.getElementById('wdm-notes').value.trim();
  work.smarthistoryUrl = document.getElementById('wdm-sh').value.trim() || undefined;

  // Save to localStorage
  try { localStorage.setItem('art-timeline-mobile-v1', JSON.stringify(DATA)); } catch(e) {}

  // Refresh view
  document.getElementById('wd-title').textContent  = work.name;
  document.getElementById('wd-artist').textContent = work.artist;
  const chips = document.getElementById('wd-chips');
  chips.innerHTML = '';
  [work.date, work.medium].filter(Boolean).forEach(t => {
    const c = document.createElement('span'); c.className = 'wd-chip'; c.textContent = t; chips.appendChild(c);
  });
  const locWrap = document.getElementById('wd-location');
  const locText = document.getElementById('wd-location-text');
  if (work.location) { locText.textContent = work.location; locWrap.style.display = 'flex'; }
  else { locWrap.style.display = 'none'; }
  document.getElementById('wd-notes').innerHTML = (work.notes||'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  const shLink = document.getElementById('wd-smarthistory');
  if (work.smarthistoryUrl) { shLink.href = work.smarthistoryUrl; shLink.style.display = 'inline-flex'; }
  else { shLink.style.display = 'none'; }
  closeEditMode();
});
</script>
<script>
