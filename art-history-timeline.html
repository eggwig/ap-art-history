<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艺术史时间轴</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&family=Ribeye&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── 你好小猫（默认粉色主题） ── */
  :root, [data-theme="neko"] {
    --bg: #fde8f0;
    --bg2: #fcd6e6;
    --card-bg: #ffffff;
    --ink: #3a2230;
    --ink-light: #7a5a6a;
    --pink: #f4a7c0;
    --pink-dark: #e8749c;
    --red: #e8374a;
    --red-light: #f06070;
    --cream: #fff5f8;
    --border: #f0b8cc;
    --border-active: #e8749c;
    --line-color: #e8749c;
    --shadow: rgba(232, 116, 156, 0.18);
    --accent: #e8749c;
    --bg-text-color: rgba(232,116,156,0.12);
  }

  /* ── 五彩斑斓的黑（深色主题） ── */
  [data-theme="kuro"] {
    --bg: #151c29;
    --bg2: #1e2738;
    --card-bg: #1e2738;
    --ink: #e8edf5;
    --ink-light: #8a97aa;
    --pink: #3b4659;
    --pink-dark: #5b7090;
    --red: #7a9ab8;
    --red-light: #8aabcc;
    --cream: #1a2233;
    --border: #3b4659;
    --border-active: #5b7090;
    --line-color: #ffffff;
    --shadow: rgba(21, 28, 41, 0.5);
    --accent: #5b7090;
    --bg-text-color: rgba(60,70,84,0.6);
    --year-label-color: #ffffff;
  }

  [data-theme="kuro"] #bg-text {
    -webkit-text-stroke: 0px !important;
    text-stroke: 0px !important;
  }

  [data-theme="kuro"] #header {
    background: linear-gradient(to bottom, rgba(21,28,41,0.97) 70%, transparent);
  }

  [data-theme="kuro"] #header p {
    color: #8a97aa;
  }

  [data-theme="kuro"] .year-label {
    color: #ffffff;
    opacity: 0.75;
  }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,192,220,0.45) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(255,210,230,0.4) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(253,220,235,0.3) 0%, transparent 70%);
    font-family: 'ZCOOL KuaiLe', 'Open Sans', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: default;
    user-select: none;
  }

  /* Subtle dot pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(232,116,156,0.12) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 1;
  }

  #world {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
  }

  /* Header */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 18px 36px 14px;
    background: linear-gradient(to bottom, rgba(253,232,240,0.97) 70%, transparent);
    pointer-events: none;
  }

  #header h1 {
    display: none;
  }

  #header h1::before {
    content: '🎨 ';
    font-style: normal;
  }

  #header p {
    font-size: 11px;
    color: var(--pink-dark);
    opacity: 0.55;
    margin-top: 2px;
    letter-spacing: 0.06em;
    font-weight: 600;
  }

  /* Year label */
  .year-label {
    position: absolute;
    transform: translateX(-50%);
    font-family: 'Open Sans', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--pink-dark);
    opacity: 0.7;
    letter-spacing: 0.04em;
    white-space: nowrap;
    pointer-events: none;
    text-align: center;
  }

  /* Art cards */
  .art-card {
    position: absolute;
    width: 120px;
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 14px;
    cursor: grab;
    z-index: 50;
    transition: width 0.32s cubic-bezier(.4,0,.2,1),
                box-shadow 0.2s,
                border-color 0.2s,
                transform 0.15s;
    box-shadow: 0 3px 12px var(--shadow), 0 1px 3px rgba(232,116,156,0.1);
    text-align: center;
  }

  .art-card:hover:not(.expanded):not(.dragging) {
    border-color: var(--border-active);
    box-shadow: 0 6px 20px rgba(232,116,156,0.25);
    transform: translateY(-2px);
    z-index: 60;
  }

  .art-card.expanded {
    width: 220px;
    border-color: var(--pink-dark);
    box-shadow: 0 8px 28px rgba(232,116,156,0.3), 0 2px 8px rgba(232,116,156,0.15);
    z-index: 150;
  }

  .art-card.dragging {
    cursor: grabbing !important;
    box-shadow: 0 14px 36px rgba(232,116,156,0.35);
    z-index: 200;
    transition: none;
    transform: rotate(1.5deg) scale(1.03);
  }

  /* Search highlight */
  .art-card.search-match {
    border-color: #e8374a !important;
    box-shadow: 0 0 0 3px rgba(232,55,74,0.25), 0 6px 20px rgba(232,55,74,0.2) !important;
    z-index: 80;
  }

  .art-card.search-dim {
    opacity: 0.25;
    filter: grayscale(0.5);
  }

  .card-color-bar {
    height: 5px;
    width: 100%;
    border-radius: 12px 12px 0 0;
  }

  /* Collapsed view */
  .card-collapsed {
    padding: 7px 10px 9px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
  }

  .c-period {
    font-family: 'Open Sans', sans-serif;
    font-size: 8px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--pink-dark);
    opacity: 0.7;
    text-align: center;
  }

  .c-title {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
  }

  .c-title-en {
    font-size: 9px;
    font-style: italic;
    font-weight: 400;
    color: var(--ink-light);
    font-family: 'Open Sans', sans-serif;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.75;
    text-align: center;
  }

  /* Expanded detail */
  .card-detail {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.35s cubic-bezier(.4,0,.2,1),
                opacity 0.25s ease 0.08s,
                padding 0.35s;
    padding: 0 10px;
    text-align: center;
  }

  .art-card.expanded .card-detail {
    max-height: 200px;
    opacity: 1;
    padding: 0 10px 12px;
  }

  .d-divider {
    height: 1.5px;
    background: linear-gradient(to right, transparent, var(--pink), transparent);
    border-radius: 2px;
    margin-bottom: 7px;
    opacity: 0.5;
  }

  .d-desc {
    font-family: 'ZCOOL KuaiLe', 'Open Sans', sans-serif;
    font-size: 11px;
    line-height: 1.65;
    color: var(--ink-light);
    margin-bottom: 7px;
    text-align: center;
  }

  .d-artists {
    padding-top: 6px;
    border-top: 1.5px dashed rgba(232,116,156,0.35);
    font-family: 'Open Sans', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: var(--pink-dark);
    opacity: 0.85;
    letter-spacing: 0.01em;
    text-align: center;
  }

  /* Close × */
  .card-close {
    display: none;
    position: absolute;
    top: 6px; right: 8px;
    font-size: 13px;
    font-weight: 800;
    color: var(--pink-dark);
    opacity: 0.45;
    cursor: pointer;
    line-height: 1;
    padding: 1px 3px;
    z-index: 10;
    border-radius: 50%;
    transition: opacity 0.15s, background 0.15s;
  }
  .card-close:hover { opacity: 1; background: var(--bg2); }
  .art-card.expanded .card-close { display: block; }

  /* ── Search bar ── */
  #search-bar {
    position: fixed;
    top: 18px;
    right: 20px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.88);
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 5px 10px 5px 14px;
    box-shadow: 0 3px 14px rgba(232,116,156,0.18);
    backdrop-filter: blur(8px);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search-bar:focus-within {
    border-color: var(--pink-dark);
    box-shadow: 0 4px 18px rgba(232,116,156,0.28);
  }
  #search-input {
    border: none;
    outline: none;
    background: transparent;
    font-family: 'ZCOOL KuaiLe', 'Open Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--ink);
    width: 140px;
    caret-color: var(--pink-dark);
  }
  #search-input::placeholder { color: rgba(232,116,156,0.55); }
  #search-clear {
    font-size: 14px;
    color: var(--pink-dark);
    opacity: 0.4;
    cursor: pointer;
    line-height: 1;
    padding: 0 2px;
    transition: opacity 0.15s;
    display: none;
  }
  #search-clear:hover { opacity: 1; }
  #search-icon { font-size: 13px; opacity: 0.5; }
  #search-count {
    font-family: 'Open Sans', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--pink-dark);
    background: var(--bg2);
    border-radius: 10px;
    padding: 1px 7px;
    display: none;
  }

  /* ── Zoom controls ── */
  #zoom-controls {
    position: fixed;
    bottom: 70px;
    right: 20px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }
  .zoom-btn {
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.9);
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--pink-dark);
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(232,116,156,0.18);
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    line-height: 1;
    user-select: none;
    backdrop-filter: blur(6px);
    position: relative;
  }
  .zoom-btn:hover {
    background: var(--bg2);
    border-color: var(--pink-dark);
    transform: scale(1.08);
  }
  .zoom-btn:active { transform: scale(0.95); }
  .zoom-btn::after {
    content: attr(data-tooltip);
    position: absolute;
    right: 46px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(58,34,48,0.82);
    color: white;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 8px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s;
  }
  .zoom-btn:hover::after { opacity: 1; }
  #zoom-label {
    font-family: 'Open Sans', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--pink-dark);
    opacity: 0.6;
    text-align: center;
  }

  /* Hint */
  #hint {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--pink-dark);
    opacity: 0.55;
    letter-spacing: 0.05em;
    z-index: 100;
    pointer-events: none;
    background: rgba(255,255,255,0.65);
    padding: 5px 18px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    backdrop-filter: blur(6px);
    white-space: nowrap;
  }

  /* Pan cursor */
  body.panning { cursor: grabbing !important; }
  body.panning .art-card { cursor: grabbing !important; }

  /* Giant background watermark */
  #bg-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Ribeye', cursive;
    font-size: clamp(80px, 14vw, 180px);
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    color: var(--bg-text-color, rgba(255,255,255,0.2));
    -webkit-text-stroke: 2.5px rgba(255,255,255,0.4);
    pointer-events: none;
    z-index: 0;
    user-select: none;
  }

  /* ── Add button ── */
  #add-btn {
    position: fixed;
    bottom: 24px;
    left: 20px;
    z-index: 200;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--pink-dark);
    border: none;
    color: white;
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(232,116,156,0.45);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: sans-serif;
  }
  #add-btn:hover { transform: scale(1.1); box-shadow: 0 6px 22px rgba(232,116,156,0.55); }
  #add-btn:active { transform: scale(0.95); }

  /* Tooltip */
  #add-btn::after {
    content: attr(data-tooltip);
    position: absolute;
    left: 54px;
    bottom: 50%;
    transform: translateY(50%);
    background: rgba(58,34,48,0.82);
    color: white;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 8px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s;
  }
  #add-btn:hover::after { opacity: 1; }

  /* ── Context menu ── */
  #ctx-menu {
    position: fixed;
    z-index: 500;
    background: white;
    border: 2px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 28px rgba(232,116,156,0.22);
    overflow: hidden;
    display: none;
    min-width: 110px;
  }
  .ctx-item {
    padding: 10px 16px;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.12s;
    display: flex; align-items: center; gap: 8px;
  }
  .ctx-item:hover { background: var(--bg2); }
  .ctx-item.danger { color: #e8374a; }
  .ctx-item + .ctx-item { border-top: 1px solid var(--border); }

  /* ── Modal overlay ── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(58,34,48,0.35);
    backdrop-filter: blur(4px);
    z-index: 400;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: white;
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 28px 28px 22px;
    width: min(460px, 92vw);
    box-shadow: 0 16px 48px rgba(232,116,156,0.25);
    position: relative;
  }
  #modal h2 {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 18px;
    color: var(--pink-dark);
    margin-bottom: 20px;
    text-align: center;
  }
  .form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 13px; }
  .form-row label {
    font-family: 'Open Sans', sans-serif;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--pink-dark); opacity: 0.7;
  }
  .form-row input, .form-row textarea, .form-row select {
    border: 1.5px solid var(--border);
    border-radius: 8px; padding: 7px 10px;
    font-family: 'ZCOOL KuaiLe', 'Open Sans', sans-serif;
    font-size: 13px; color: var(--ink); outline: none;
    transition: border-color 0.15s; background: #fff; width: 100%;
  }
  .form-row input:focus, .form-row textarea:focus { border-color: var(--pink-dark); }
  .form-row textarea { resize: vertical; min-height: 58px; }
  .form-two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .btn-cancel {
    padding: 8px 20px; border: 2px solid var(--border); border-radius: 20px;
    background: white; font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 13px; color: var(--ink-light); cursor: pointer; transition: border-color 0.15s;
  }
  .btn-cancel:hover { border-color: var(--pink-dark); }
  .btn-save {
    padding: 8px 24px; border: none; border-radius: 20px;
    background: var(--pink-dark); font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 13px; color: white; cursor: pointer;
    box-shadow: 0 3px 12px rgba(232,116,156,0.35);
    transition: transform 0.1s, box-shadow 0.15s;
  }
  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(232,116,156,0.45); }
  #modal-close {
    position: absolute; top: 12px; right: 16px;
    font-size: 20px; color: var(--pink-dark); opacity: 0.4;
    cursor: pointer; transition: opacity 0.15s; line-height: 1;
  }
  #modal-close:hover { opacity: 1; }
  .color-swatches { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .swatch {
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; border: 2.5px solid transparent;
    transition: transform 0.1s, border-color 0.1s;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.selected { border-color: var(--ink); transform: scale(1.18); }

  /* ── Works list inside card ── */
  .c-count {
    font-family: 'Open Sans', sans-serif;
    font-size: 9px; font-weight: 700;
    color: var(--pink-dark); opacity: 0.6;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-top: 2px;
  }
  .art-card.expanded { width: 260px; }

  .d-works-list {
    display: flex; flex-direction: column; gap: 1px;
    max-height: min(360px, 45vh); overflow-y: auto;
    margin-top: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--pink) transparent;
    overscroll-behavior: contain;
  }
  .d-work-item {
    display: flex; flex-direction: column;
    padding: 5px 8px; border-radius: 7px;
    cursor: pointer; transition: background 0.12s;
    text-align: left;
  }
  .d-work-item:hover { background: var(--bg2); }
  .d-work-name {
    font-family: 'Open Sans', sans-serif;
    font-size: 10px; font-weight: 600;
    color: var(--ink); line-height: 1.3;
  }
  .d-work-artist {
    font-family: 'Open Sans', sans-serif;
    font-size: 9px; color: var(--ink-light);
    opacity: 0.7; margin-top: 1px;
  }

  /* ── Work detail popup ── */
  #work-popup {
    position: fixed; inset: 0;
    background: rgba(58,34,48,0.4);
    backdrop-filter: blur(5px);
    z-index: 600;
    display: none; align-items: center; justify-content: center;
  }
  #work-popup.open { display: flex; }
  #work-popup-inner {
    background: white;
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: min(480px, 92vw);
    max-height: 85vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    box-shadow: 0 20px 60px rgba(232,116,156,0.25);
    position: relative;
    animation: popIn 0.2s ease;
    scrollbar-width: thin;
    scrollbar-color: var(--pink) transparent;
  }
  @keyframes popIn {
    from { transform: scale(0.94); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  #work-popup-close {
    position: absolute; top: 14px; right: 18px;
    font-size: 20px; color: var(--pink-dark); opacity: 0.4;
    cursor: pointer; transition: opacity 0.15s; line-height: 1;
  }
  #work-popup-close:hover { opacity: 1; }
  .wp-period-tag {
    display: inline-block;
    font-family: 'Open Sans', sans-serif;
    font-size: 9px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: white; border-radius: 10px;
    padding: 3px 10px; margin-bottom: 12px;
  }
  .wp-title {
    font-family: 'Open Sans', sans-serif;
    font-size: 17px; font-weight: 800;
    color: var(--ink); line-height: 1.3;
    margin-bottom: 4px;
  }
  .wp-artist {
    font-family: 'Open Sans', sans-serif;
    font-size: 12px; color: var(--ink-light);
    margin-bottom: 12px; font-style: italic;
  }
  .wp-meta {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
  }
  .wp-meta-chip {
    font-family: 'Open Sans', sans-serif;
    font-size: 10px; font-weight: 600;
    background: var(--bg2); border-radius: 8px;
    padding: 4px 10px; color: var(--ink-light);
  }
  .wp-notes {
    font-family: 'Open Sans', sans-serif;
    font-size: 12px; line-height: 1.7;
    color: var(--ink-light);
    border-top: 1.5px dashed rgba(232,116,156,0.3);
    padding-top: 12px; margin-top: 4px;
  }

  /* ── Work popup image ── */
  #wp-img-wrap {
    width: 100%; margin-bottom: 14px;

  /* ── Theme toggle button ── */
  #theme-toggle {

    height: 36px;

    border-radius: 50%;

    align-items: center;
    justify-content: center;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 2px 10px var(--shadow);
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    backdrop-filter: blur(6px);
    position: relative;
  }
  #theme-toggle:hover {
    background: var(--bg2);
    border-color: var(--pink-dark);
    transform: scale(1.08);
  }
  #theme-toggle:active { transform: scale(0.95); }
  #theme-toggle::after {
    content: attr(data-tooltip);
    position: absolute;
    right: 46px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(21,28,41,0.85);
    color: white;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 8px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s;
  }
  #theme-toggle:hover::after { opacity: 1; }

    color: #8ab4d4;
  }

    background: rgba(21,28,41,0.92);
  }
  [data-theme="kuro"] #search-input {
    background: rgba(30,39,56,0.8);
    color: var(--ink);
  }
  [data-theme="kuro"] .work-popup {
    background: var(--card-bg);
  }
  [data-theme="kuro"] #hint {
    background: rgba(21,28,41,0.85);
    color: rgba(232,237,245,0.7);
  }

  #wp-edit-btn {
    position: absolute;
    top: 14px; right: 44px;
    background: none; border: none;
    font-size: 16px; cursor: pointer;
    opacity: 0.4; transition: opacity 0.15s;
    padding: 2px 4px; border-radius: 6px;
    line-height: 1;
  }
  #wp-edit-btn:hover { opacity: 1; background: var(--bg2); }
  #wp-edit-btn.editing { opacity: 1; }

  /* ── Edit form ── */
  .wp-edit-label {
    font-family: 'Open Sans', sans-serif;
    font-size: 10px; font-weight: 700;
    color: var(--pink-dark);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 12px 0 4px;
  }
  .wp-edit-input {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;

    font-size: 13px;

    flex: 1; padding: 9px 0;

    cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }

  .wpe-btn:active { transform: scale(0.97); }
  .wpe-btn-save { background: var(--pink-dark); color: #fff; }
  .wpe-btn-cancel { background: var(--bg2); color: var(--ink); }

  [data-theme="kuro"] .wp-edit-input { background: var(--bg2); border-color: var(--border); color: var(--ink); }

<body>

<div id="bg-text">Art History</div>

<div id="header">
  <h1>艺术史 · Art History</h1>
</div>

<!-- Search -->
<div id="search-bar">
  <span id="search-icon">🔍</span>
  <input id="search-input" type="text" placeholder="搜索艺术家、流派…" autocomplete="off" />
  <span id="search-count"></span>
  <span id="search-clear">×</span>
</div>

<!-- Zoom -->
<div id="zoom-controls">
  <button id="theme-toggle" data-tooltip="切换：五彩斑斓的黑">🌙</button>
  <button class="zoom-btn" id="zoom-in" data-tooltip="放大">+</button>
  <div id="zoom-label">100%</div>
  <button class="zoom-btn" id="zoom-out" data-tooltip="缩小">−</button>
</div>

<canvas id="canvas"></canvas>
<div id="world"></div>

<div id="hint">点击卡片展开介绍 · 拖动移动 · 滚轮平移</div>
<div id="scroll-hint"></div>

<!-- Add button -->
<button id="add-btn" data-tooltip="添加新流派卡片">+</button>

<!-- Context menu -->
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-edit">✏️ 编辑</div>
  <div class="ctx-item danger" id="ctx-delete">🗑️ 删除</div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <span id="modal-close">×</span>
    <h2 id="modal-title">添加流派</h2>
    <div class="form-two">
      <div class="form-row"><label>中文名称</label><input id="f-title" placeholder="如：印象派" /></div>
      <div class="form-row"><label>English Name</label><input id="f-titleEn" placeholder="e.g. Impressionism" /></div>
    </div>
    <div class="form-two">
      <div class="form-row"><label>年份</label><input id="f-year" type="number" placeholder="如：1874" /></div>
      <div class="form-row"><label>时期</label><input id="f-period" placeholder="如：1874 – 1890s" /></div>
    </div>
    <div class="form-row"><label>简介</label><textarea id="f-desc" placeholder="一两句话描述这个流派的特点…"></textarea></div>
    <div class="form-row"><label>代表艺术家（用 · 分隔）</label><input id="f-artists" placeholder="如：Monet · Renoir · Degas" /></div>
    <div class="form-row"><label>卡片颜色</label><div class="color-swatches" id="color-swatches"></div></div>
    <div class="form-row"><label>位置</label>
      <select id="f-side"><option value="top">时间轴上方</option><option value="bottom">时间轴下方</option></select>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" id="modal-cancel">取消</button>
      <button class="btn-save" id="modal-save">保存</button>
    </div>
  </div>
</div>

<!-- Work detail popup -->
<div id="work-popup">
  <div id="work-popup-inner">
    <span id="work-popup-close">×</span>
    <button id="wp-edit-btn" title="编辑">✏️</button>
    <div class="wp-period-tag" id="wp-tag">Unit</div>
    <div id="wp-img-wrap">
      <div id="wp-img-placeholder">🔍 loading image…</div>
      <img id="wp-img" src="" alt="" style="display:none"/>
      <div id="wp-img-credit"></div>
    </div>
    <!-- VIEW mode -->
    <div id="wp-view-mode">
      <div class="wp-title" id="wp-title">Work Title</div>
      <div class="wp-artist" id="wp-artist">Artist</div>
      <div class="wp-meta">
        <div class="wp-meta-chip" id="wp-date">Date</div>
        <div class="wp-meta-chip" id="wp-medium">Medium</div>
      </div>
      <div class="wp-meta-chip" id="wp-location" style="display:none;margin-bottom:10px;font-size:10px;color:var(--ink-light)"></div>
      <div class="wp-notes" id="wp-notes">Notes</div>
      <a id="wp-smarthistory-btn" href="#" target="_blank" rel="noopener" style="display:none; margin-top:14px; align-items:center; gap:6px; padding:8px 16px; background:#c0392b; color:#fff; border-radius:20px; font-size:13px; font-family:Open Sans,sans-serif; text-decoration:none; font-weight:600; letter-spacing:0.3px;">
        📖 Read on Smarthistory
      </a>
    </div>
    <!-- EDIT mode -->
    <div id="wp-edit-mode" style="display:none">
      <div class="wp-edit-label">标题 Title</div>
      <input class="wp-edit-input" id="wpe-name" type="text" placeholder="作品名称">
      <div class="wp-edit-label">艺术家 Artist</div>
      <input class="wp-edit-input" id="wpe-artist" type="text" placeholder="艺术家">
      <div class="wp-edit-label">日期 Date</div>
      <input class="wp-edit-input" id="wpe-date" type="text" placeholder="如 c. 1503–1519">
      <div class="wp-edit-label">材质 Medium</div>
      <input class="wp-edit-input" id="wpe-medium" type="text" placeholder="如 Oil on panel">
      <div class="wp-edit-label">地点 Location</div>
      <input class="wp-edit-input" id="wpe-location" type="text" placeholder="如 Louvre, Paris">
      <div class="wp-edit-label">笔记 Notes <span style="font-weight:400;opacity:0.6">（**粗体**）</span></div>
      <textarea class="wp-edit-input" id="wpe-notes" rows="5" placeholder="作品描述、意义、特点…"></textarea>
      <div class="wp-edit-label">Smarthistory 链接</div>
      <input class="wp-edit-input" id="wpe-smarthistory" type="url" placeholder="https://smarthistory.org/...">
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button id="wpe-save" class="wpe-btn wpe-btn-save">💾 保存</button>
        <button id="wpe-cancel" class="wpe-btn wpe-btn-cancel">取消</button>
      </div>
    </div>
  </div>
</div>

  // Segments are arranged left-to-right with a visual gap/break between them.
  //
  //  SEG 0: 30000 BCE → 500 BCE   (Prehistory + Ancient)
  //  SEG 1: 500 BCE  → 1400 CE   (Classical + Medieval)
  //  SEG 2: 1400 CE  → 2015 CE   (Renaissance → Contemporary)
  //
  // Each segment has its own world-X range.

  const TIMELINE_Y = 420;

  const SEG = [
    { id:0, yearStart:-25000, yearEnd:-500,  xStart:200,  xEnd:1300,  label:"30,000 – 500 BCE" },
    { id:1, yearStart:-500,   yearEnd:1400,  xStart:1550, xEnd:2650,  label:"500 BCE – 1400 CE" },
    { id:2, yearStart:1400,   yearEnd:2015,  xStart:2900, xEnd:4500,  label:"1400 – 2015 CE" }
  ];

  const TOTAL_W = 4700;

// ─── State ────────────────────────────────────────────────────────────────────
let panX = 0;              // horizontal only — timeline Y is always screen center
let scale = 1;
const SCALE_MIN = 0.4, SCALE_MAX = 2.0, SCALE_STEP = 0.15;

let isPanning = false;
let panStartX = 0, panOriginX = 0;

let draggingCard = null;
let dragOffset   = { x: 0, y: 0 };

const cardPositions = {};
let expandedCard = null;

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const world  = document.getElementById('world');

// ─── Coordinate helpers ───────────────────────────────────────────────────────
function getSegForYear(year) {
  // Returns the segment that contains this year
  for (let i = SEG.length - 1; i >= 0; i--) {
    if (year >= SEG[i].yearStart) return SEG[i];
  }
  return SEG[0];
}

function yearToWorldX(year) {
  const seg = getSegForYear(year);
  const span = seg.yearEnd - seg.yearStart;
  // Use log scale for ancient segments, linear for modern
  let t;
  if (seg.id === 0) {
    // log scale for prehistory: compress large BCE range
    const logStart = Math.log10(Math.max(1, Math.abs(seg.yearStart)));
    const logEnd   = Math.log10(Math.max(1, Math.abs(seg.yearEnd)));
    const logY     = year < 0 ? Math.log10(Math.max(1, Math.abs(year))) : 0;
    t = 1.0 - (logY - logEnd) / (logStart - logEnd);
  } else if (seg.id === 1) {
    // log scale for classical/medieval
    const shift = 600; // shift so -500 becomes 100
    const s0 = Math.log10(seg.yearStart + shift);
    const s1 = Math.log10(seg.yearEnd   + shift);
    t = (Math.log10(year + shift) - s0) / (s1 - s0);
  } else {
    // linear for Renaissance → Contemporary
    t = (year - seg.yearStart) / (seg.yearEnd - seg.yearStart);
  }
  t = Math.max(0, Math.min(1, t));
  return seg.xStart + t * (seg.xEnd - seg.xStart);
}

// Timeline is always pinned to vertical screen center
function timelineScreenY() { return window.innerHeight / 2; }

// World → Screen
function worldToScreen(wx, wy) {
  return {
    x: wx * scale + panX,
    y: timelineScreenY() + (wy - TIMELINE_Y) * scale
  };
}

// Screen → World
function screenToWorld(sx, sy) {
  return {
    x: (sx - panX) / scale,
    y: TIMELINE_Y + (sy - timelineScreenY()) / scale
  };
}

// ─── Build DOM ────────────────────────────────────────────────────────────────
function buildTimeline() {
  const ticksBySeg = [
    [-25000, -15000, -10000, -5000, -3000, -2000, -1500, -1000, -500],
    [-500, -300, 0, 300, 500, 700, 900, 1100, 1300, 1400],
    [1400, 1450, 1500, 1550, 1600, 1650, 1700, 1750, 1800, 1850, 1900, 1950, 2000, 2015]
  ];

  ticksBySeg.forEach(ticks => {
    ticks.forEach(y => {
      const wx = yearToWorldX(y);
      const lbl = document.createElement('div');
      lbl.className = 'year-label';
      lbl.dataset.wx = wx;
      lbl.style.left = wx + 'px';
      lbl.style.top  = (TIMELINE_Y + 14) + 'px';
      if (y < 0)       lbl.textContent = Math.abs(y).toLocaleString() + ' BCE';
      else if (y === 0) lbl.textContent = '1 CE';
      else              lbl.textContent = y >= 1000 ? String(y) : y + ' CE';
      world.appendChild(lbl);
    });
  });

  // Segment title labels (above axis)
  SEG.forEach(seg => {
    const midX = (seg.xStart + seg.xEnd) / 2;
    const lbl = document.createElement('div');
    lbl.style.position = 'absolute';
    lbl.style.left = midX + 'px';
    lbl.style.top = (TIMELINE_Y - 28) + 'px';
    lbl.style.transform = 'translateX(-50%)';
    lbl.style.fontFamily = "'ZCOOL KuaiLe', sans-serif";
    lbl.style.fontSize = '11px';
    lbl.style.color = 'var(--pink-dark)';
    lbl.style.opacity = '0.6';
    lbl.style.letterSpacing = '0.06em';
    lbl.style.pointerEvents = 'none';
    lbl.style.whiteSpace = 'nowrap';
    lbl.textContent = seg.label;
    world.appendChild(lbl);
  });
}

function buildCards() {
  DATA.forEach((item) => {
    const wx = yearToWorldX(item.year);
    const card = document.createElement('div');
    card.className  = 'art-card';
    card.dataset.id = item.id;

    const cardWX = wx - 60 + (Math.random() * 20 - 10);
    const cardWY = item.side === 'top'
      ? TIMELINE_Y + item.offset - (Math.random() * 15)
      : TIMELINE_Y + item.offset + (Math.random() * 15);

    cardPositions[item.id] = { x: cardWX, y: cardWY };
    card.style.left = cardWX + 'px';
    card.style.top  = cardWY + 'px';

    card.innerHTML = `
      <div class="card-color-bar" style="background:${item.color}"></div>
      <span class="card-close" title="收起">×</span>
      <div class="card-collapsed">
        <div class="c-period">${item.period||''}</div>
        <div class="c-title">${item.title}</div>
        <div class="c-title-en">${item.titleEn||''}</div>
        ${item.works ? `<div class="c-count">${item.works.length} works</div>` : ''}
      </div>
      <div class="card-detail">
        <div class="d-divider"></div>
        <div class="d-desc">${item.desc||''}</div>
        ${item.works ? `<div class="d-works-list">
          ${item.works.map(w => `<div class="d-work-item" data-work-id="${w.id}" data-period-id="${item.id}">
            <span class="d-work-name">${w.name}</span>
            <span class="d-work-artist">${w.artist}</span>
          </div>`).join('')}
        </div>` : (item.artists ? `<div class="d-artists">🎨 ${item.artists}</div>` : '')}
      </div>`;

    world.appendChild(card);

    attachCardEvents(card, item);
  });
}

// ─── Theme color helper ───────────────────────────────────────────────────────
function getThemeColor(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

// ─── Draw canvas ─────────────────────────────────────────────────────────────
function drawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const tsy = timelineScreenY();
  const lineColor  = getThemeColor('--line-color') || '#e8749c';
  const lineColorA75 = hexToRgba(lineColor, 0.75);
  const lineColorA50 = hexToRgba(lineColor, 0.5);
  const lineColorA45 = hexToRgba(lineColor, 0.45);
  const lineColorA70 = hexToRgba(lineColor, 0.7);
  const nodeFill   = getThemeColor('--bg') || '#fff9fb';

  // Draw each of the three segments as its own axis line
  SEG.forEach((seg, idx) => {
    const sx0 = worldToScreen(seg.xStart, TIMELINE_Y).x;
    const sx1 = worldToScreen(seg.xEnd,   TIMELINE_Y).x;
    if (sx1 < -20 || sx0 > canvas.width + 20) return;

    // Axis line with gradient fade at ends
    const grad = ctx.createLinearGradient(sx0, 0, sx1, 0);
    grad.addColorStop(0,   hexToRgba(lineColor, 0.1));
    grad.addColorStop(0.05, hexToRgba(lineColor, 0.85));
    grad.addColorStop(0.95, hexToRgba(lineColor, 0.85));
    grad.addColorStop(1,   hexToRgba(lineColor, 0.1));
    ctx.beginPath(); ctx.moveTo(sx0, tsy); ctx.lineTo(sx1, tsy);
    ctx.strokeStyle = grad; ctx.lineWidth = 2.5; ctx.stroke();

    // Arrowhead at right end of each segment
    ctx.beginPath();
    ctx.moveTo(sx1, tsy);
    ctx.lineTo(sx1 - 11, tsy - 5);
    ctx.lineTo(sx1 - 11, tsy + 5);
    ctx.closePath(); ctx.fillStyle = lineColorA75; ctx.fill();
  });

  // Draw break/ellipsis symbols between segments
  for (let i = 0; i < SEG.length - 1; i++) {
    const gapX0 = worldToScreen(SEG[i].xEnd   + 30, TIMELINE_Y).x;
    const gapX1 = worldToScreen(SEG[i+1].xStart - 30, TIMELINE_Y).x;
    const gapMid = (gapX0 + gapX1) / 2;
    if (gapMid < -50 || gapMid > canvas.width + 50) continue;

    ctx.save();
    ctx.strokeStyle = lineColorA50;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(gapX0, tsy); ctx.lineTo(gapX1, tsy);
    ctx.stroke();
    ctx.setLineDash([]);

    // « » break marks
    ctx.fillStyle = lineColorA70;
    ctx.font = 'bold 18px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('/ /', gapMid, tsy);
    ctx.restore();
  }

  // Tick marks for each segment
  const ticksBySeg = [
    [-25000,-15000,-10000,-5000,-3000,-2000,-1500,-1000,-500],
    [-500,-300,0,300,500,700,900,1100,1300,1400],
    [1400,1450,1500,1550,1600,1650,1700,1750,1800,1850,1900,1950,2000,2015]
  ];
  ticksBySeg.forEach(ticks => {
    ticks.forEach(y => {
      const sx = worldToScreen(yearToWorldX(y), TIMELINE_Y).x;
      if (sx < -10 || sx > canvas.width + 10) return;
      ctx.beginPath(); ctx.moveTo(sx, tsy - 6); ctx.lineTo(sx, tsy + 6);
      ctx.strokeStyle = lineColorA45; ctx.lineWidth = 1.5; ctx.stroke();
    });
  });

  // Connector lines + dots
  DATA.forEach(item => {
    const pos = cardPositions[item.id];
    if (!pos) return;

    const nodeX = worldToScreen(yearToWorldX(item.year), TIMELINE_Y).x;
    const nodeY = tsy; // always pinned

    const cardEl = document.querySelector(`.art-card[data-id="${item.id}"]`);
    const cardH = cardEl ? cardEl.offsetHeight / scale : 55;
    const cardW = cardEl ? cardEl.offsetWidth  / scale : 60;

    const connectS = worldToScreen(
      pos.x + cardW / 2,
      item.side === 'top' ? pos.y + cardH : pos.y
    );

    ctx.beginPath(); ctx.moveTo(nodeX, nodeY);
    const midY = (nodeY + connectS.y) / 2;
    ctx.bezierCurveTo(nodeX, midY, connectS.x, midY, connectS.x, connectS.y);
    ctx.strokeStyle = hexToRgba(item.color, 0.65);
    ctx.lineWidth = 1.5; ctx.setLineDash([]); ctx.stroke();

    // Node dot (outline style)
    ctx.beginPath(); ctx.arc(nodeX, nodeY, 5, 0, Math.PI * 2);
    ctx.fillStyle = nodeFill; ctx.fill();
    ctx.beginPath(); ctx.arc(nodeX, nodeY, 5, 0, Math.PI * 2);
    ctx.strokeStyle = item.color; ctx.lineWidth = 2; ctx.stroke();

    // Card anchor dot
    ctx.beginPath(); ctx.arc(connectS.x, connectS.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba(item.color, 0.6); ctx.fill();
  });
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ─── Apply transform ──────────────────────────────────────────────────────────
// Cards are in world coords inside #world.
// Timeline world Y = TIMELINE_Y must map to screen Y = timelineScreenY().
// So world's Y offset = timelineScreenY() - TIMELINE_Y * scale
function applyTransform() {
  const wy = timelineScreenY() - TIMELINE_Y * scale;
  world.style.transform = `translate(${panX}px, ${wy}px) scale(${scale})`;
  world.style.transformOrigin = '0 0';
  drawCanvas();
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}

function clampPan() {
  const vw = window.innerWidth;
  panX = Math.max(-(TOTAL_W * scale - vw + 100), Math.min(150, panX));
}

// ─── Zoom ─────────────────────────────────────────────────────────────────────
function zoomAt(cx, newScale) {
  const wx = (cx - panX) / scale;
  scale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, newScale));
  panX = cx - wx * scale;
  clampPan(); applyTransform();
}

document.getElementById('zoom-in').addEventListener('click',  () => zoomAt(window.innerWidth / 2, scale + SCALE_STEP));
document.getElementById('zoom-out').addEventListener('click', () => zoomAt(window.innerWidth / 2, scale - SCALE_STEP));

// ─── Search ───────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const searchCount = document.getElementById('search-count');

function doSearch(query) {
  const q = query.trim().toLowerCase();
  searchClear.style.display = q ? 'block' : 'none';
  if (!q) {
    document.querySelectorAll('.art-card').forEach(c => c.classList.remove('search-match', 'search-dim'));
    searchCount.style.display = 'none'; return;
  }
  let matchCount = 0, firstMatch = null;
  document.querySelectorAll('.art-card').forEach(card => {
    const item = DATA.find(d => d.id === card.dataset.id);
    if (!item) return;
    const text = [item.title, item.titleEn, item.artists, item.desc, item.period].join(' ').toLowerCase();
    const matches = text.includes(q);
    card.classList.toggle('search-match', matches);
    card.classList.toggle('search-dim', !matches);
    if (matches) { matchCount++; if (!firstMatch) firstMatch = item.id; }
  });
  searchCount.textContent = `${matchCount} 个结果`;
  searchCount.style.display = matchCount > 0 ? 'inline-block' : 'none';
  if (firstMatch) {
    const pos = cardPositions[firstMatch];
    if (pos) { panX = window.innerWidth / 2 - (pos.x + 60) * scale; clampPan(); applyTransform(); }
  }
}

searchInput.addEventListener('input', (e) => doSearch(e.target.value));
searchClear.addEventListener('click', () => { searchInput.value = ''; doSearch(''); searchInput.focus(); });

// ─── Mouse ────────────────────────────────────────────────────────────────────
document.addEventListener('mousedown', (e) => {
  if (e.target.closest('.art-card') || e.target.closest('#search-bar') || e.target.closest('#zoom-controls')) return;
  isPanning = true; panStartX = e.clientX; panOriginX = panX;
  document.body.classList.add('panning');
});

document.addEventListener('mousemove', (e) => {
  if (draggingCard) {
    const card = document.querySelector(`.art-card[data-id="${draggingCard}"]`);
    if (card) {
      const newWX = (e.clientX - dragOffset.x - panX) / scale;
      const newWY = screenToWorld(0, e.clientY - dragOffset.y).y;
      cardPositions[draggingCard] = { x: newWX, y: newWY };
      card.style.left = newWX + 'px'; card.style.top = newWY + 'px';
      drawCanvas();
    }
    return;
  }
  if (isPanning) { panX = panOriginX + (e.clientX - panStartX); clampPan(); applyTransform(); }
});

document.addEventListener('mouseup', () => {
  if (draggingCard) {
    document.querySelector(`.art-card[data-id="${draggingCard}"]`)?.classList.remove('dragging');
    draggingCard = null;
  }
  isPanning = false; document.body.classList.remove('panning');
});

document.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    zoomAt(e.clientX, scale * (1 - e.deltaY * 0.005));
  } else {
    panX -= e.deltaX * 1.2; clampPan(); applyTransform();
  }
}, { passive: false });

// ─── Touch ────────────────────────────────────────────────────────────────────
let lastTouchDist = null;

document.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    return;
  }
  if (e.touches.length !== 1) return;
  const t = e.touches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY)?.closest('.art-card');
  if (el) {
    draggingCard = el.dataset.id;
    const rect = el.getBoundingClientRect();
    dragOffset.x = t.clientX - rect.left; dragOffset.y = t.clientY - rect.top;
    el.classList.add('dragging');
  } else { isPanning = true; panStartX = t.clientX; panOriginX = panX; }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 2 && lastTouchDist !== null) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    zoomAt((e.touches[0].clientX + e.touches[1].clientX) / 2, scale * (dist / lastTouchDist));
    lastTouchDist = dist; return;
  }
  const t = e.touches[0];
  if (draggingCard) {
    const card = document.querySelector(`.art-card[data-id="${draggingCard}"]`);
    if (card) {
      const newWX = (t.clientX - dragOffset.x - panX) / scale;
      const newWY = screenToWorld(0, t.clientY - dragOffset.y).y;
      cardPositions[draggingCard] = { x: newWX, y: newWY };
      card.style.left = newWX + 'px'; card.style.top = newWY + 'px'; drawCanvas();
    }
  } else if (isPanning) { panX = panOriginX + (t.clientX - panStartX); clampPan(); applyTransform(); }
}, { passive: false });

document.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) lastTouchDist = null;
  if (draggingCard) { document.querySelector(`.art-card[data-id="${draggingCard}"]`)?.classList.remove('dragging'); draggingCard = null; }
  isPanning = false;
});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  clampPan(); applyTransform();
});

}

// ─── Single card builder ──────────────────────────────────────────────────────
function buildSingleCard(item) {
  const wx = yearToWorldX(item.year);
  const card = document.createElement('div');
  card.className = 'art-card'; card.dataset.id = item.id;
  const cx = cardPositions[item.id]?.x ?? (wx - 60);
  const cy = cardPositions[item.id]?.y ?? (TIMELINE_Y + item.offset);
  cardPositions[item.id] = { x: cx, y: cy };
  card.style.left = cx + 'px'; card.style.top = cy + 'px';
  card.innerHTML = `
    <div class="card-color-bar" style="background:${item.color}"></div>
    <span class="card-close" title="收起">×</span>
    <div class="card-collapsed">
      <div class="c-period">${item.period||''}</div>
      <div class="c-title">${item.title}</div>
      <div class="c-title-en">${item.titleEn||''}</div>
      ${item.works ? `<div class="c-count">${item.works.length} works</div>` : ''}
    </div>
    <div class="card-detail">
      <div class="d-divider"></div>
      <div class="d-desc">${item.desc||''}</div>
      ${item.works ? `<div class="d-works-list">
        ${item.works.map(w => `<div class="d-work-item" data-work-id="${w.id}" data-period-id="${item.id}">
          <span class="d-work-name">${w.name}</span>

        </div>`).join('')}
      </div>` : (item.artists ? `<div class="d-artists">🎨 ${item.artists||''}</div>` : '')}
    </div>`;
  world.appendChild(card);
  attachCardEvents(card, item);
}

// ─── Card event attachment ────────────────────────────────────────────────────
function attachCardEvents(card, item) {
  let didDrag = false, longPressTimer = null;
  card.addEventListener('mousedown', e => {
    e.stopPropagation(); didDrag = false; draggingCard = item.id;
    const r = card.getBoundingClientRect();
    dragOffset.x = e.clientX - r.left; dragOffset.y = e.clientY - r.top;
    card.classList.add('dragging');
  });
  card.addEventListener('mousemove', () => { didDrag = true; });
  card.addEventListener('contextmenu', e => { e.preventDefault(); showCtxMenu(e.clientX, e.clientY, item.id); });
  card.addEventListener('mouseup', e => {
    card.classList.remove('dragging'); draggingCard = null;
    if (didDrag || e.button === 2) return;
    if (e.target.classList.contains('card-close')) {
      card.classList.remove('expanded'); expandedCard = null; setTimeout(drawCanvas,360); return;
    }
    const isExp = card.classList.contains('expanded');
    if (expandedCard && expandedCard !== card) expandedCard.classList.remove('expanded');
    card.classList.toggle('expanded', !isExp);
    expandedCard = isExp ? null : card;
    setTimeout(drawCanvas, 360);
  });
  let touchMoved = false;
  card.addEventListener('touchstart', e => {
    touchMoved = false; draggingCard = item.id;
    const t = e.touches[0]; const r = card.getBoundingClientRect();
    dragOffset.x = t.clientX - r.left; dragOffset.y = t.clientY - r.top;
    card.classList.add('dragging');
    longPressTimer = setTimeout(() => { if (!touchMoved) showCtxMenu(t.clientX, t.clientY, item.id); }, 600);
  }, { passive: true });
  card.addEventListener('touchmove', () => { touchMoved = true; clearTimeout(longPressTimer); }, { passive: true });
  card.addEventListener('touchend', e => {
    clearTimeout(longPressTimer);
    card.classList.remove('dragging'); draggingCard = null;
    if (touchMoved) return;
    if (e.target.classList.contains('card-close')) {
      card.classList.remove('expanded'); expandedCard = null; setTimeout(drawCanvas,360); return;
    }
    const isExp = card.classList.contains('expanded');
    if (expandedCard && expandedCard !== card) expandedCard.classList.remove('expanded');
    card.classList.toggle('expanded', !isExp);
    expandedCard = isExp ? null : card;
    setTimeout(drawCanvas, 360);
  });
}

// ─── Wikipedia image loader (fetch REST API — works on https) ─────────────────
function loadWikiImage(workName, artistName) {
  const imgEl      = document.getElementById('wp-img');
  const placeholder= document.getElementById('wp-img-placeholder');
  const credit     = document.getElementById('wp-img-credit');

  imgEl.style.display = 'none';
  imgEl.src = '';
  placeholder.style.display = 'flex';
  placeholder.textContent = '🔍 searching…';
  credit.textContent = '';

  const query = workName + (artistName && artistName !== 'Unknown' ? ' ' + artistName : '');

  // Step 1: search Wikipedia
  fetch('https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch='
    + encodeURIComponent(query)
    + '&format=json&srlimit=3&origin=*')
  .then(r => r.json())
  .then(data => {
    const hits = data.query && data.query.search;
    if (!hits || hits.length === 0) { placeholder.textContent = 'No image found'; return; }
    const pageTitle = hits[0].title;

    // Step 2: get thumbnail
    return fetch('https://en.wikipedia.org/w/api.php?action=query&titles='
      + encodeURIComponent(pageTitle)
      + '&prop=pageimages&pithumbsize=600&format=json&origin=*')
    .then(r => r.json())
    .then(d2 => {
      const pages = d2.query && d2.query.pages;
      const page  = pages ? Object.values(pages)[0] : null;
      const thumb = page && page.thumbnail && page.thumbnail.source;
      if (thumb) {
        imgEl.onload = () => {
          placeholder.style.display = 'none';
          imgEl.style.display = 'block';
          credit.textContent = 'via Wikipedia · ' + pageTitle;
        };
        imgEl.onerror = () => { placeholder.textContent = 'Image unavailable'; };
        imgEl.src = thumb;
      } else {
        placeholder.textContent = 'No image found';
      }
    });
  })
  .catch(() => { placeholder.textContent = 'Image unavailable'; });
}

  wpEditMode.style.display = 'block';
  wpEditBtn.textContent = '👁';
  wpEditBtn.classList.add('editing');
}

function closeEditMode() {
  wpViewMode.style.display = 'block';
  wpEditMode.style.display = 'none';
  wpEditBtn.textContent = '✏️';
  wpEditBtn.classList.remove('editing');
}

wpEditBtn.addEventListener('click', () => {
  if (wpEditMode.style.display === 'block') { closeEditMode(); }
  else { openEditMode(); }
});

document.getElementById('wpe-cancel').addEventListener('click', closeEditMode);

document.getElementById('wpe-save').addEventListener('click', () => {
  const period = DATA.find(d => d.id === _editPeriodId);
  const work   = period?.works?.find(w => w.id === _editWorkId);
  if (!work) return;

  // Apply edits
  work.name    = wpeNameEl.value.trim()   || work.name;
  work.artist  = wpeArtistEl.value.trim();
  work.date    = wpeDateEl.value.trim();
  work.medium  = wpeMediumEl.value.trim();
  work.location= wpeLocEl.value.trim();
  work.notes   = wpeNotesEl.value.trim();
  work.smarthistoryUrl = wpeShEl.value.trim() || undefined;

  saveData();

  // Refresh view mode
  document.getElementById('wp-title').textContent  = work.name;
  document.getElementById('wp-artist').textContent = work.artist;
  document.getElementById('wp-date').textContent   = work.date;
  document.getElementById('wp-medium').textContent = work.medium;
  const notesEl = document.getElementById('wp-notes');
  notesEl.innerHTML = (work.notes || '').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  const locEl = document.getElementById('wp-location');
  if (work.location) { locEl.textContent = '📍 ' + work.location; locEl.style.display = 'block'; }
  else { locEl.style.display = 'none'; }
  const shBtn = document.getElementById('wp-smarthistory-btn');
  if (work.smarthistoryUrl) { shBtn.href = work.smarthistoryUrl; shBtn.style.display = 'inline-flex'; }
  else { shBtn.style.display = 'none'; }

  // Refresh card in timeline
  drawCanvas();
  closeEditMode();

  // Flash save confirmation
  const orig = document.getElementById('wpe-save').textContent;
  document.getElementById('wpe-save'); // already closed edit mode
});
</script>
</body>
</html>
